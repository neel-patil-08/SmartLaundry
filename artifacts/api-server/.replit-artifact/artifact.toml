kind = "api"
previewPath = "/"
title = "LaundroLink"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 5000
name = "LaundroLink"
paths = ["/"]

[services.development]
run = "bash -c 'cd /home/runner/workspace && pnpm run dev'"

[services.production]

[services.production.build]
args = ["pnpm", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "dist/index.js"]

[services.production.run.env]
PORT = "5000"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
